<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>focus</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary:       #00897B;
        --primary-light: #E0F2F1;
        --primary-dark:  #00695C;
        --blue:          #1565C0;
        --bg:            #F0F4F8;
        --surface:       #FFFFFF;
        --ink:           #1A2340;
        --ink-soft:      #78909C;
        --line:          #ECEFF1;
        --shadow:        0 2px 12px rgba(0,0,0,0.08);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Zen Kaku Gothic New", system-ui, sans-serif;
        background: var(--bg);
        width: 320px;
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }

      /* ===== ヘッダー ===== */
      .popup-header {
        background: var(--blue);
        padding: 18px 20px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .popup-header__icon {
        font-size: 26px;
        line-height: 1;
      }

      .popup-header__brand {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .popup-header__name {
        font-size: 18px;
        font-weight: 700;
        color: white;
        letter-spacing: 0.02em;
      }

      .popup-header__sub {
        font-size: 11px;
        color: rgba(255,255,255,0.7);
      }

      /* ===== カード ===== */
      .popup-body {
        padding: 14px 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .card {
        background: var(--surface);
        border-radius: 16px;
        padding: 14px 16px;
        box-shadow: var(--shadow);
      }

      /* ===== 達成率カード ===== */
      .progress-card__label {
        font-size: 12px;
        font-weight: 700;
        color: var(--ink-soft);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 10px;
      }

      .progress-card__row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .progress-card__track {
        flex: 1;
        height: 8px;
        background: var(--line);
        border-radius: 99px;
        overflow: hidden;
      }

      .progress-card__bar {
        height: 100%;
        background: var(--primary);
        border-radius: 99px;
        width: 0%;
        transition: width 0.4s ease;
      }

      .progress-card__count {
        font-size: 13px;
        font-weight: 700;
        color: var(--primary-dark);
        white-space: nowrap;
        flex: none;
      }

      /* ===== スタディモードカード ===== */
      .mode-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .mode-card__text {}

      .mode-card__title {
        font-size: 14px;
        font-weight: 700;
        color: var(--ink);
      }

      .mode-card__sub {
        font-size: 11px;
        color: var(--ink-soft);
        margin-top: 2px;
      }

      /* トグルスイッチ */
      .toggle {
        position: relative;
        flex: none;
        cursor: pointer;
      }

      .toggle input {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle__track {
        display: block;
        width: 46px;
        height: 26px;
        background: #CFD8DC;
        border-radius: 99px;
        transition: background 0.25s;
        position: relative;
      }

      .toggle__track::after {
        content: '';
        position: absolute;
        top: 3px;
        left: 3px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: white;
        box-shadow: 0 1px 4px rgba(0,0,0,0.25);
        transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
      }

      .toggle input:checked + .toggle__track {
        background: var(--primary);
      }

      .toggle input:checked + .toggle__track::after {
        transform: translateX(20px);
      }

      /* ===== 管理画面ボタン ===== */
      .open-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 14px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 14px;
        font-family: "Zen Kaku Gothic New", system-ui, sans-serif;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
      }

      .open-btn:hover  { background: var(--primary-dark); }
      .open-btn:active { transform: scale(0.98); }

      .open-btn__arrow {
        font-size: 16px;
        opacity: 0.8;
      }

      /* ===== スタディモードON時バナー ===== */
      .mode-banner {
        display: none;
        background: var(--primary-light);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 12px;
        color: var(--primary-dark);
        font-weight: 500;
        text-align: center;
      }

      .mode-banner.active { display: block; }
    </style>
  </head>
  <body>

    <!-- ヘッダー -->
    <div class="popup-header">
      <span class="popup-header__icon">🛡️</span>
      <div class="popup-header__brand">
        <span class="popup-header__name">focus</span>
        <span class="popup-header__sub">集中サポート</span>
      </div>
    </div>

    <div class="popup-body">

      <!-- 今日の達成率 -->
      <div class="card">
        <p class="progress-card__label">今日の達成率</p>
        <div class="progress-card__row">
          <div class="progress-card__track">
            <div class="progress-card__bar" id="progress-bar"></div>
          </div>
          <span class="progress-card__count" id="progress-count">- / -</span>
        </div>
      </div>

      <!-- スタディモード -->
      <div class="card mode-card">
        <div class="mode-card__text">
          <p class="mode-card__title">スタディモード</p>
          <p class="mode-card__sub">ONにするとサイトをブロック</p>
        </div>
        <label class="toggle" aria-label="スタディモード切替">
          <input type="checkbox" id="study-mode-toggle" />
          <span class="toggle__track"></span>
        </label>
      </div>

      <!-- ON時メッセージ -->
      <div class="mode-banner" id="mode-banner">
        🔒 集中モード中 — 対象サイトをブロックしています
      </div>

      <!-- 管理画面を開く -->
      <button class="open-btn" id="open-app" type="button">
        管理画面を開く
        <span class="open-btn__arrow">→</span>
      </button>

    </div>

    <script src="storage.js"></script>
    <script src="popup-entry.js"></script>
  </body>
</html>
