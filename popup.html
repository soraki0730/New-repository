<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>今日のタスク</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>

    <main class="app" style="max-width: 520px; gap: 28px;">
      <header class="head">
        <div class="head__brand">
          <span class="head__mark">focus</span>
          <span class="head__sub">今日のタスク</span>
        </div>
      </header>

      <div class="mode-switch">
        <label class="mode-switch__label">
          <input id="study-mode-toggle" type="checkbox" />
          <span>スタディモード</span>
        </label>
      </div>

      <div class="composer" style="justify-content: center; padding: 24px 18px;">
        <button id="open-app" class="composer__add" type="button">
          管理画面を開く
        </button>
      </div>
    </main>

    <script src="storage.js"></script>
    <script src="popup-entry.js"></script>
  </body>
</html>
