<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>閲覧制限中</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
        color: #fff;
        font-family: system-ui, sans-serif;
        padding: 24px;
      }
      .block-panel {
        max-width: 560px;
        width: 100%;
      }
      h1 {
        margin: 0 0 24px;
        font-size: 2rem;
        text-align: center;
      }
      .block-message {
        text-align: center;
        margin: 0 0 24px;
        line-height: 1.6;
        opacity: 0.9;
      }
      .tasks-section {
        margin: 24px 0;
        padding: 20px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
      }
      .tasks-section h2 {
        margin: 0 0 16px;
        font-size: 1.2rem;
        opacity: 0.8;
      }
      .tasks-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .task-item {
        padding: 12px;
        margin: 8px 0;
        background: rgba(255, 255, 255, 0.08);
        border-left: 3px solid #c75b39;
        border-radius: 4px;
        font-size: 0.95rem;
      }
      .task-name {
        font-weight: 500;
        margin-bottom: 4px;
      }
      .task-meta {
        font-size: 0.85rem;
        opacity: 0.7;
      }
      .hint {
        text-align: center;
        font-size: 0.95rem;
        opacity: 0.75;
        margin: 16px 0;
      }
      .block-button {
        display: block;
        width: 100%;
        padding: 14px 20px;
        border: none;
        border-radius: 8px;
        background: #c75b39;
        color: #fff;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.15s ease, background 0.2s ease;
        box-sizing: border-box;
      }
      .block-button:hover {
        background: #b14e2f;
      }
      .block-button:active {
        transform: scale(0.97);
      }
      .empty-state {
        text-align: center;
        padding: 32px 0;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="block-panel">
      <h1>閲覧制限中</h1>
      <div class="block-message">
        <p id="block-message">読み込み中...</p>
        <p class="hint" id="block-hint"></p>
      </div>

      <div class="tasks-section">
        <h2>未完了タスク</h2>
        <div id="tasks-container">
          <div class="empty-state">読み込み中...</div>
        </div>
      </div>

      <button id="open-app" class="block-button" type="button">
        タスク管理画面へ
      </button>
    </div>

    <script src="storage.js"></script>
    <script src="block-entry.js"></script>
  </body>
</html>
