<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>閲覧制限中</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
        color: #fff;
        font-family: system-ui, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .block-panel {
        max-width: 560px;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 2rem;
      }
      p {
        margin: 0 0 16px;
        line-height: 1.6;
        opacity: 0.9;
      }
      .hint {
        font-size: 0.95rem;
        opacity: 0.75;
      }
      .block-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 14px 20px;
        border: none;
        border-radius: 999px;
        background: #c75b39;
        color: #fff;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.15s ease, background 0.2s ease;
      }
      .block-button:hover {
        background: #b14e2f;
      }
      .block-button:active {
        transform: scale(0.97);
      }
    </style>
  </head>
  <body>
    <div class="block-panel">
      <h1>閲覧制限中</h1>
      <p id="block-message">読み込み中...</p>
      <p class="hint" id="block-hint"></p>
      <button id="open-app" class="block-button" type="button">
        タスク管理画面へ
      </button>
    </div>

    <script src="storage.js"></script>
    <script src="block-entry.js"></script>
  </body>
</html>
