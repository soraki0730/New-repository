<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>今日のタスク</title>

    <!-- フォント：Fraunces（数字・ロゴ用の表情のある書体）＋ Zen Kaku Gothic New（日本語UI） -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>

    <main class="app">
      <!-- ヘッダー：ロゴ＋進捗サマリ（◯/◯） -->
      <header class="head">
        <div class="head__brand">
          <span class="head__mark">focus</span>
          <span class="head__sub">今日のタスク</span>
        </div>

        <div class="summary" aria-live="polite">
          <div class="summary__count">
            <span id="progress-count">0 / 0</span>
            <span class="summary__label">完了</span>
          </div>
          <div class="summary__track">
            <div class="summary__bar" id="progress-bar"></div>
          </div>
        </div>
      </header>

      <div class="mode-switch">
        <label class="mode-switch__label">
          <input id="study-mode-toggle" type="checkbox" />
          <span>スタディモード</span>
        </label>
      </div>

      <!-- 入力欄：タイトルのみで登録。Enter で即追加（入力をめんどくさくしない） -->
      <div class="composer">
        <input
          id="task-input"
          class="composer__input"
          type="text"
          placeholder="やることを入力して Enter"
          autocomplete="off"
          autofocus
        />
        <button
          id="add-btn"
          class="composer__add"
          type="button"
          aria-label="タスクを追加"
        >
          <span>＋</span>
        </button>
      </div>

      <!-- 一覧 -->
      <ul id="task-list" class="list" aria-label="タスク一覧"></ul>

      <!-- 空のときの表示 -->
      <p id="empty-state" class="empty" hidden>
        まだタスクがありません。上の欄に入力して始めよう。
      </p>
    </main>

    <!-- 1行ぶんの見た目テンプレート（A が見た目を所有 / popup.js が複製して中身を入れる） -->
    <template id="task-item">
      <li class="task">
        <label class="task__checkwrap">
          <input class="task__check" type="checkbox" />
          <span class="task__checkbox" aria-hidden="true"></span>
        </label>

        <div class="task__body">
          <span class="task__title"></span>
          <div class="task__progress">
            <input
              class="task__range"
              type="range"
              min="0"
              max="100"
              step="5"
              aria-label="進捗"
            />
            <span class="task__pct">0%</span>
          </div>
        </div>

        <button class="task__delete" type="button" aria-label="削除">×</button>
      </li>
    </template>

    <script src="storage.js"></script>
    <script src="app.js"></script>
  </body>
</html>
